<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat App</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#f0f2f5;
}

/* HEADER */
.header{
    background:#008069;
    color:white;
    padding:15px;
    font-size:18px;
    font-weight:bold;
}

/* CHAT BOX */
#chatBox{
    height:80vh;
    overflow-y:auto;
    padding:10px;
    display:flex;
    flex-direction:column;
    gap:8px;
}

/* MESSAGE BUBBLE */
.message{
    max-width:70%;
    padding:10px;
    border-radius:10px;
    font-size:14px;
    position:relative;
    word-wrap:break-word;
}

/* MY MESSAGE (RIGHT SIDE) */
.me{
    align-self:flex-end;
    background:#d9fdd3;
}

/* OTHER MESSAGE (LEFT SIDE) */
.other{
    align-self:flex-start;
    background:white;
}

/* TIME */
.time{
    font-size:10px;
    color:gray;
    margin-top:5px;
}

/* INPUT AREA */
.inputBox{
    position:fixed;
    bottom:0;
    width:100%;
    display:flex;
    padding:10px;
    background:white;
    gap:10px;
}

input{
    flex:1;
    padding:10px;
    border-radius:20px;
    border:1px solid #ccc;
    outline:none;
}

button{
    background:#008069;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:20px;
}
</style>

</head>

<body>

<div class="header">
💬 WhatsApp Style Chat
</div>

<div id="chatBox"></div>

<div class="inputBox">
    <input type="text" id="messageInput" placeholder="Type a message">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module" src="script.js"></script>

</body>
</html>
